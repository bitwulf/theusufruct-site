name: Build and deploy

on:
  push:
    branches: [main]
  # Triggered from the bitwulf/Usufruct corpus repo when a new release ships.
  repository_dispatch:
    types: [corpus-released]
  # Manual rerun from the Actions tab.
  workflow_dispatch:

# Prevent two deploys racing — `rclone sync` is destructive (deletes
# files in the destination that aren't in source).
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        # `npm run build` runs prebuild (fetch-corpus.sh) → astro build →
        # pagefind → sync-pagefind-to-public.
        run: npm run build

      - name: Install rclone
        run: curl -fsSL https://rclone.org/install.sh | sudo bash

      - name: Sync dist/ to R2
        # Uses rclone with --checksum so we diff by MD5/ETag, not mtime.
        # `aws s3 sync` compares size+mtime, which marks every freshly-built
        # file as changed (mtime is always "now" in CI) and re-uploads all
        # 211K files every run. With --checksum, only files whose bytes
        # actually differ get pushed.
        env:
          RCLONE_CONFIG_R2_TYPE: s3
          RCLONE_CONFIG_R2_PROVIDER: Cloudflare
          RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          RCLONE_CONFIG_R2_ENDPOINT: https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com
          RCLONE_CONFIG_R2_REGION: auto
        run: |
          rclone sync dist/ R2:theusufruct-prod/ \
            --checksum \
            --transfers 64 \
            --checkers 64 \
            --fast-list \
            --no-update-modtime \
            --stats=30s \
            --stats-one-line \
            -v

      - name: Purge Cloudflare cache
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
        run: |
          curl -fsS -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'
