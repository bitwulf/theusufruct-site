name: Build and deploy

on:
  push:
    branches: [main]
  # Triggered from the bitwulf/Usufruct corpus repo when a new release ships.
  repository_dispatch:
    types: [corpus-released]
  # Manual rerun from the Actions tab.
  workflow_dispatch:

# Prevent two deploys racing — `aws s3 sync --delete` is destructive.
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        # `npm run build` runs prebuild (fetch-corpus.sh) → astro build →
        # pagefind → sync-pagefind-to-public.
        run: npm run build

      - name: Sync dist/ to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com
        run: |
          # Bump concurrent transfers — default 10 is glacial for ~50K
          # changed HTML files on a content-tag bump.
          aws configure set default.s3.max_concurrent_requests 64
          aws configure set default.s3.max_queue_size 10000
          aws s3 sync dist/ s3://theusufruct-prod/ \
            --endpoint-url "$R2_ENDPOINT" \
            --delete \
            --no-progress \
            --only-show-errors

      - name: Purge Cloudflare cache
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
        run: |
          curl -fsS -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'
